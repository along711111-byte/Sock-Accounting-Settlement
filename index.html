<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase 照妖鏡測試</title>
</head>
<body style="padding: 20px; font-family: sans-serif; background-color: #f0f0f0;">
    
    <h2 style="color: #333;">Firebase 連線照妖鏡</h2>
    <p>如果寫不進去，這裡會顯示真正的錯誤原因：</p>
    
    <button id="btn" style="padding: 15px 30px; font-size: 18px; background: #e11d48; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
        點我發射測試資料
    </button>
    
    <div id="log" style="margin-top: 30px; border: 2px dashed #999; padding: 15px; min-height: 200px; background: white; font-size: 16px; line-height: 1.6; word-break: break-all;">
        系統準備就緒...請點擊上方紅色的按鈕 👇<br>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // 您專屬的連線金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyDU2eAMCLTvbcofC5N7l_qOufvkK78N1h8",
            authDomain: "sock-accounting-settlement.firebaseapp.com",
            projectId: "sock-accounting-settlement",
            storageBucket: "sock-accounting-settlement.firebasestorage.app",
            messagingSenderId: "571398198878",
            appId: "1:571398198878:web:82e860609168ffc6a686cf"
        };
        
        const log = document.getElementById('log');
        
        document.getElementById('btn').onclick = async () => {
            log.innerHTML += "<br>▶ 開始嘗試連線...<br>";
            try {
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                log.innerHTML += "▶ Firebase 初始化成功...正在嘗試寫入資料...<br>";
                
                await addDoc(collection(db, "test_connection"), {
                    message: "恭喜！成功寫入！",
                    time: new Date().toLocaleString()
                });
                log.innerHTML += "<br><span style='color:green; font-weight:bold; font-size: 20px;'>✅ 寫入成功！資料庫完全沒問題了！</span><br>";
            } catch (e) {
                log.innerHTML += "<br><span style='color:red; font-weight:bold; font-size: 20px;'>❌ 發生錯誤，抓到兇手了：</span><br>";
                log.innerHTML += "<span style='color:red; font-weight:bold;'>" + e.message + "</span><br>";
            }
        };
    </script>
</body>
</html>
